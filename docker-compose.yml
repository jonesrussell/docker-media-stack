version: "3"

services:

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    ports:
      - 8989:8989
    volumes:
      - "${CONFIG_DIR:?}/sonarr:/config"
      - "${MEDIA_DIR:?}/tv:/tv"
      - "${DOWNLOAD_DIR:?}:/downloads"
    env_file: ./.env
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    ports:
      - 7878:7878
    volumes:
      - "${CONFIG_DIR:?}/radarr:/config"
      - "${MEDIA_DIR:?}/movies:/movies"
      - "${DOWNLOAD_DIR:?}:/downloads"
    env_file: ./.env
    restart: unless-stopped

  transmission:
    image: linuxserver/transmission:latest
    container_name: transmission
    # network_mode: host # deluge had this
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
        # - TRANSMISSION_WEB_HOME=/combustion-release/ #optional
      - "USER=${USERNAME}"
      - "PASS=${PASSWORD}"
    volumes:
      - "${CONFIG_DIR:?}/transmission:/config"
      - "${DOWNLOAD_DIR:?}:/downloads"
        # - path to watch folder:/watch
    ports:
      - 9091:9091
      - 51413:51413
      - 51413:51413/udp
    env_file: ./.env
    restart: unless-stopped

  jackett:
    image: linuxserver/jackett:latest
    container_name: jackett
    ports:
      - 9117:9117
    volumes:
      - "${CONFIG_DIR:?}/jackett:/config"
    env_file: ./.env
    restart: unless-stopped

  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    ports:
      - "${PLEX_PORT}:32400"
    network_mode: host
    volumes:
      - "${CONFIG_DIR:?}/plex:/config"
      - "${MEDIA_DIR:?}:/media"
      - "${TRANSCODE_DIR:?}:/transcode"
    env_file: ./.env
    restart: unless-stopped

  tautulli:
    image: tautulli/tautulli:latest
    container_name: tautulli
    ports:
      - 8181:8181
    volumes:
      - "${CONFIG_DIR:?}/tautulli:/config"
      - "${CONFIG_DIR:?}/plex/Library/Application\ Support/Plex\ Media\ Server/Logs/:/plex_logs:ro"
    env_file: ./.env
    restart: unless-stopped

  watchtower:
    image: v2tec/watchtower:latest
    container_name: watchtower_media-stack
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: sonarr radarr transmission jackett plex tautulli bazarr ombi watchtower_media-stack -s "0 0 3 ? * *" --cleanup
    env_file: ./.env
    restart: unless-stopped

  bazarr:
    image: linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - UMASK_SET=002 #optional
    volumes:
      - "${CONFIG_DIR:?}/bazarr:/config"
      - "${MEDIA_DIR:?}/movies:/movies"
      - "${MEDIA_DIR:?}/tv:/tv"
    ports:
      - "${BAZARR_PORT}:6767"
    env_file: ./.env
    restart: unless-stopped

  ombi:
    image: linuxserver/ombi:latest
    container_name: ombi
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - BASE_URL=/ombi #optional
    volumes:
      - "${CONFIG_DIR:?}/ombi:/config"
    ports:
      - 3579:3579
    env_file: ./.env
    restart: unless-stopped

