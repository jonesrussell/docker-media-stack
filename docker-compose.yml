version: "3"

services:

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    ports:
      - 8989:8989
    volumes:
      - "${CONFIG_DIR:?}/sonarr:/config"
      - "${TV_DIR:?}:/tv"
      - "${DOWNLOAD_DIR:?}:/downloads"
    env_file: ./.env
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    ports:
      - 7878:7878
    volumes:
      - "${CONFIG_DIR:?}/radarr:/config"
      - "${MOVIES_DIR:?}:/movies"
      - "${DOWNLOAD_DIR:?}:/downloads"
    env_file: ./.env
    restart: unless-stopped

  jackett:
    image: linuxserver/jackett:latest
    container_name: jackett
    ports:
      - 9117:9117
    volumes:
      - "${CONFIG_DIR:?}/jackett:/config"
    env_file: ./.env
    restart: unless-stopped

  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    ports:
      - "${PLEX_PORT}:32400"
    network_mode: host
    volumes:
      - "${CONFIG_DIR:?}/plex:/config"
      - "${TV_DIR:?}:/media/tv"
      - "${MOVIES_DIR:?}:/media/movies"
      - "${XXX_DIR:?}:/media/xxx"
      - "${MUSIC_DIR:?}:/media/music"
      - "${TRANSCODE_DIR:?}:/transcode"
    env_file: ./.env
    restart: unless-stopped

  tautulli:
    image: tautulli/tautulli:latest
    container_name: tautulli
    ports:
      - 8181:8181
    volumes:
      - "${CONFIG_DIR:?}/tautulli:/config"
      - "${CONFIG_DIR:?}/plex/Library/Application\ Support/Plex\ Media\ Server/Logs/:/plex_logs:ro"
    env_file: ./.env
    restart: unless-stopped

  nzbget:
    image: linuxserver/nzbget
    container_name: nzbget
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - "${CONFIG_DIR:?}/nzbget:/config"
      - "${MOVIES_DIR:?}:/movies"
      - "${TV_DIR:?}:/tv"
      - "${DOWNLOAD_DIR:?}:/downloads"
    ports:
      - 6789:6789
    env_file: ./.env
    restart: unless-stopped

  watchtower:
    image: v2tec/watchtower:latest
    container_name: watchtower_media-stack
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: sonarr radarr nzbget jackett plex tautulli bazarr watchtower_media-stack -s "0 0 3 ? * *" --cleanup
    env_file: ./.env
    restart: unless-stopped

    #  lidarr:
    #    image: ghcr.io/linuxserver/lidarr
    #    container_name: lidarr
    #    env_file: ./.env
    #    volumes:
    #      - "${CONFIG_DIR:?}/lidarr:/config"
    #      - "${MUSIC_DIR:?}:/music"
    #      - "${DOWNLOAD_DIR:?}:/downloads"
    #    ports:
    #      - "${LIDARR_PORT}:8686"
    #    restart: unless-stopped

  bazarr:
    image: linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - UMASK_SET=002 #optional
    volumes:
      - "${CONFIG_DIR:?}/bazarr:/config"
      - "${MOVIES_DIR:?}:/movies"
      - "${TV_DIR:?}:/tv"
    ports:
      - "${BAZARR_PORT}:6767"
    env_file: ./.env
    restart: unless-stopped

  ombi:
    image: linuxserver/ombi:latest
    container_name: ombi
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - BASE_URL=/ombi #optional
    volumes:
      - "${CONFIG_DIR:?}/ombi:/config"
    ports:
      - 3579:3579
    env_file: ./.env
    restart: unless-stopped

